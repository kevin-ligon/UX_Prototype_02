<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE Live Ops Popup</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="popup-styles.css">
</head>
<body>
    <div class="popup-container">
        <div class="popup-background">
            <!-- Close Button -->
            <button class="btn-close" aria-label="Close">
                <img src="../images/ui-elements/btn-close.png" alt="Close">
            </button>

            <!-- Header -->
            <h1 class="popup-title">PVE LIVE OPS</h1>

            <!-- Battle Preview -->
            <div class="battle-preview">
                <img src="../images/backgrounds/battle-scene.png" alt="Battle scene">
            </div>

            <!-- Missions Progress -->
            <div class="missions-section">
                <h2 class="section-title">Missions</h2>
                <div class="progress-bar-container">
                    <div class="progress-bar-bg"></div>
                    <div class="progress-bar-fill" style="width: 60%;"></div>
                    <span class="progress-text">3/5</span>
                </div>
            </div>

            <!-- Potential Rewards -->
            <h2 class="section-title">Potential Rewards</h2>
            <div class="rewards-grid">
                <div class="reward-card">
                    <img src="../images/backgrounds/card-uncommon.png" alt="Reward" class="reward-bg">
                    <img src="../images/icons/currency-fuel.png" alt="Fuel" class="reward-icon">
                    <span class="reward-quantity">x11</span>
                    <span class="reward-bonus">+100k</span>
                </div>
                <div class="reward-card">
                    <img src="../images/backgrounds/card-uncommon.png" alt="Reward" class="reward-bg">
                    <img src="../images/icons/currency-fuel.png" alt="Fuel" class="reward-icon">
                    <span class="reward-quantity">x11</span>
                    <span class="reward-bonus">+100k</span>
                </div>
                <div class="reward-card">
                    <img src="../images/backgrounds/card-uncommon.png" alt="Reward" class="reward-bg">
                    <img src="../images/icons/currency-fuel.png" alt="Fuel" class="reward-icon">
                    <span class="reward-quantity">x11</span>
                    <span class="reward-bonus">+100k</span>
                </div>
                <div class="reward-card">
                    <img src="../images/backgrounds/card-uncommon.png" alt="Reward" class="reward-bg">
                    <img src="../images/icons/currency-fuel.png" alt="Fuel" class="reward-icon">
                    <span class="reward-quantity">x11</span>
                    <span class="reward-bonus">+100k</span>
                </div>
                <div class="reward-card">
                    <img src="../images/backgrounds/card-uncommon.png" alt="Reward" class="reward-bg">
                    <img src="../images/icons/currency-fuel.png" alt="Fuel" class="reward-icon">
                    <span class="reward-quantity">x11</span>
                    <span class="reward-bonus">+100k</span>
                </div>
            </div>

            <!-- Entry Cost -->
            <div class="entry-section">
                <div class="cost-display">
                    <img src="../images/icons/currency-generic.png" alt="Currency" class="cost-icon">
                    <span class="cost-amount">1.5k</span>
                </div>
                <button class="btn-enter">ENTER</button>
            </div>
        </div>
    </div>

    <style>
        /* PVE Specific Styles */
        .battle-preview {
            width: 100%;
            height: 250px;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 100%);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: var(--spacing-lg);
        }

        .battle-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .missions-section {
            margin-bottom: var(--spacing-lg);
        }

        .progress-bar-container {
            position: relative;
            width: 100%;
            height: 21px;
            margin-top: var(--spacing-sm);
        }

        .progress-bar-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }

        .progress-bar-fill {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, #ff4500 0%, #ff8c00 100%);
            border-radius: 6px;
            transition: width 0.3s ease;
        }

        .progress-text {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            font-weight: bold;
            font-style: italic;
            color: var(--color-white);
        }
    </style>
</body>
</html>
